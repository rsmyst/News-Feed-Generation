<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Feed Generation</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="main-nav container flex">
        <a href="#" onclick="reload()" class="logo"
          ><img src="./assets/logo.png" alt="news logo"
        /></a>
        <div class="nav-links">
          <ul class="flex">
            <li
              class="hover-link nav-item"
              id="blockchain"
              onclick="onNavItemClick('Blockchain')"
            >
              Blockchain
            </li>
            <li
              class="hover-link nav-item"
              id="memes"
              onclick="onNavItemClick('Memes')"
            >
              Memes
            </li>
            <li
              class="hover-link nav-item"
              id="politics"
              onclick="onNavItemClick('Politics')"
            >
              Politics
            </li>
          </ul>
        </div>
        <div class="search-bar flex">
          <input
            type="text"
            class="news-input"
            id="news-input"
            placeholder="For Example: Machine Learning"
          />
          <button class="search-btn" id="search-btn">Search</button>
        </div>
      </div>
    </nav>
    <main>
      <div class="container flex cards-container" id="cards-container"></div>
    </main>
    <template id="template-news-card"
      ><div class="card">
        <div class="card-header">
          <img
            src=" https://www.shutterstock.com/image-photo/profile-tibetan-pigmy-goat-isolated-260nw-2386101391.jpg"
            alt="placeholder"
            id="news-img"
          />
        </div>
        <div class="card-content">
          <h3 class="news-title" id="news-title">TITLE</h3>
          <h5 class="news-source" id="news-source">SOURCE AND DATE</h5>
          <p class="news-desc" id="news-desc">
            Lorem ipsum dolor, sit amet consectetur adipisicing elit. At
            aspernatur illo veritatis maiores animi porro repellendus, omnis
            iusto ipsa aliquid facilis libero, quas consequuntur. Dolorem iste
            in consequatur corrupti dignissimos.
          </p>
        </div>
      </div></template
    >
    <script src="script.js"></script>
  </body>
</html>
